<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDL AI Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="brand-header">
        <img src="logo.png" alt="SDL Logo" class="brand-logo" onerror="this.style.display='none'">
        <div class="brand-text">
          <span class="company-name">SAMDAMLET</span>
          <span class="reg-number">BN3541970</span>
        </div>
      </div>

      <div class="section-title">SERVICE PILLARS</div>
      <nav class="sidebar-menu">
        <button class="pillar-btn active" data-pillar="electrical">Electrical Infrastructure</button>
        <button class="pillar-btn" data-pillar="solar">Solar & Inverter Systems</button>
        <button class="pillar-btn" data-pillar="satellite">Satellite Installations</button>
      </nav>

      <div class="api-box-container">
        <label for="api-key-input">OPENAI API KEY</label>
        <input type="password" id="api-key-input" placeholder="sk-...">
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <h1>SDL <span class="orange-text">AI QUOTE</span> GENERATOR</h1>
        <p>Generate instant, itemized, and branded electrical quotations powered by AI.</p>
      </header>

      <div class="tags-container" id="tags-container">
        </div>

      <div class="output-display-area" id="output-display">
        Your generated itemized quotation will appear here...
      </div>

      <div class="input-wrapper">
        <input type="text" id="project-prompt" class="quote-input-bar" placeholder="Describe your project scope...">
        <button id="generate-btn" class="send-btn">⚡</button>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
